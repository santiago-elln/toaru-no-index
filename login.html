<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — A Certain Index</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="card">
  <div class="logo-dot"></div>
  <div class="brand">A Certain Index</div>

  <h1>Acesso restrito</h1>
  <p class="subtitle">Este portal é exclusivo para colaboradores iGreen Energy. Entre com seu e-mail e senha corporativos.</p>

  <form class="login-form" id="loginForm" onsubmit="return loginWithPassword(event)">
    <input class="login-input" type="email"    id="email"    placeholder="E-mail corporativo" autocomplete="username"         required>
    <input class="login-input" type="password" id="password" placeholder="Senha"              autocomplete="current-password" required>
    <button class="btn-login" id="loginBtn" type="submit">Entrar</button>
  </form>

  <div id="alertMsg" style="display:none" class="alert"></div>

  <p class="footer-note">
    Apenas contas <strong>@igreenenergy.com.br</strong> são aceitas.<br>
    Problemas? Fale com o administrador do sistema.
  </p>
</div>

<script>
  const SUPABASE_URL = '__SUPABASE_URL__'
  const SUPABASE_KEY = '__SUPABASE_KEY__'
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

  // URL para onde voltar após o login (passada como ?next=...)
  const nextUrl = new URLSearchParams(location.search).get('next') || 'index.html'

  // Se já tiver sessão ativa, redireciona direto
  client.auth.getSession().then(({ data: { session } }) => {
    if (session) redirect()
  })

  // Captura o callback do OAuth (Supabase redireciona de volta aqui)
  client.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) redirect()
  })

  function redirect() {
    // Evita redirecionar para fora do site
    const safe = nextUrl.startsWith('http') ? 'index.html' : nextUrl
    location.replace(safe)
  }

  async function loginWithPassword(e) {
    if (e) e.preventDefault()
    const btn = document.getElementById('loginBtn')
    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    btn.disabled = true
    btn.textContent = 'Entrando…'
    hideAlert()

    const { error } = await client.auth.signInWithPassword({ email, password })

    if (error) {
      showAlert('E-mail ou senha inválidos.')
      btn.disabled = false
      btn.textContent = 'Entrar'
    }
    // On success, onAuthStateChange('SIGNED_IN') redirects.
    return false
  }

  function showAlert(msg) {
    const el = document.getElementById('alertMsg')
    el.textContent = msg
    el.style.display = 'block'
  }

  function hideAlert() {
    document.getElementById('alertMsg').style.display = 'none'
  }
</script>
</body>
</html>
