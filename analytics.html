<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — A Certain Index</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/analytics.css">
  <link rel="stylesheet" href="css/calendar.css">
</head>
<body>

<nav id="mainNav" style="display:none">
  <a href="admin.html" class="nav-back">← Admin</a>
  <div class="nav-sep"></div>
  <span class="nav-title">Analytics</span>
  <span class="nav-user" id="navUser"></span>
  <button class="nav-logout" onclick="logout()">Sair</button>
</nav>

<main>
  <div class="denied" id="deniedState">
    <div class="denied-code">403</div>
    <h2>Acesso negado</h2>
    <p>Esta página é restrita ao administrador do sistema.</p>
    <a href="index.html">← Voltar ao índice</a>
  </div>

  <div id="analyticsSection" style="display:none">

    <!-- Summary -->
    <div class="summary-grid" id="summaryGrid">
      <div class="stat-card">
        <div class="stat-label">Total de acessos</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Usuários únicos</div>
        <div class="stat-value" id="statUsers">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Arquivo mais acessado</div>
        <div class="stat-value" id="statTopFile" style="font-size:14px;font-weight:600;margin-top:4px">—</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="email" onclick="setTab('email')">Por usuário</button>
      <button class="tab-btn" data-tab="file" onclick="setTab('file')">Por arquivo</button>
      <button class="tab-btn" data-tab="log" onclick="setTab('log')">Log completo</button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <div class="filter-group">
        <label>Período</label>
        <button class="date-trigger" id="calendarToggle" aria-haspopup="dialog">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span id="rangeDisplay">Qualquer data</span>
          <button class="date-trigger-clear" id="dateClear" title="Limpar">✕</button>
        </button>
      </div>
      <div class="filters-sep"></div>
      <div class="filter-group">
        <label>Arquivo</label>
        <select id="fileFilter" onchange="applyFilters()">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="filters-sep"></div>
      <div class="filter-group">
        <label>E-mail</label>
        <input type="text" id="emailFilter" placeholder="Buscar e-mail…"
          style="width:200px" oninput="applyFilters()">
      </div>
      <button class="btn-clear-all" onclick="clearAllFilters()">Limpar filtros</button>
    </div>

    <div class="section-header">
      <div class="section-title" id="tableTitle">Por usuário</div>
      <div class="record-count" id="recordCount"></div>
    </div>

    <div class="table-wrap">
      <table id="dataTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

  </div>
</main>

<script>
  const SUPABASE_URL = '__SUPABASE_URL__'
  const SUPABASE_KEY = '__SUPABASE_KEY__'
  const ADMIN_EMAIL  = '__ADMIN_EMAIL__'
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

  let allLogs    = []
  let filtered   = []
  let activeTab  = 'email'
  let dateFrom   = '', dateTo = ''
  let sortCol    = '', sortDir = 'desc'

  // ── AUTH ──────────────────────────────────────────────────────────────────
  client.auth.onAuthStateChange((_event, session) => {
    if (!session) { location.replace('login.html?next=analytics.html'); return }
    if (session.user.email !== ADMIN_EMAIL) {
      document.getElementById('deniedState').style.display = 'flex'
      return
    }
    document.getElementById('mainNav').style.display       = 'flex'
    document.getElementById('analyticsSection').style.display = 'block'
    document.getElementById('navUser').textContent         = session.user.email
    init()
  })

  async function logout() { await client.auth.signOut() }

  // ── INIT ──────────────────────────────────────────────────────────────────
  async function init() {
    const { data, error } = await client
      .from('access_logs')
      .select('*')
      .order('accessed_at', { ascending: false })
      .limit(2000)

    if (error) { console.error(error); return }
    allLogs = data

    // Popula dropdown de arquivos
    const files = [...new Map(data.map(r => [r.page_slug, r.page_title])).entries()]
    const sel = document.getElementById('fileFilter')
    files.forEach(([slug, title]) => {
      const opt = document.createElement('option')
      opt.value = slug
      opt.textContent = title || slug
      sel.appendChild(opt)
    })

    applyFilters()
    initCalendar()
  }

  // ── FILTERS ───────────────────────────────────────────────────────────────
  function applyFilters() {
    const fileVal  = document.getElementById('fileFilter').value
    const emailVal = document.getElementById('emailFilter').value.toLowerCase().trim()

    filtered = allLogs.filter(r => {
      if (fileVal  && r.page_slug  !== fileVal)                      return false
      if (emailVal && !r.user_email.toLowerCase().includes(emailVal)) return false
      if (dateFrom && r.accessed_at.slice(0,10) < dateFrom)          return false
      if (dateTo   && r.accessed_at.slice(0,10) > dateTo)            return false
      return true
    })

    updateSummary(filtered)
    renderTab()
  }

  function clearAllFilters() {
    document.getElementById('fileFilter').value  = ''
    document.getElementById('emailFilter').value = ''
    dateFrom = ''; dateTo = ''
    document.getElementById('rangeDisplay').textContent = 'Qualquer data'
    document.getElementById('calendarToggle').classList.remove('active')
    applyFilters()
  }

  // ── SUMMARY ───────────────────────────────────────────────────────────────
  function updateSummary(logs) {
    document.getElementById('statTotal').textContent = logs.length

    const users = new Set(logs.map(r => r.user_email)).size
    document.getElementById('statUsers').textContent = users

    if (logs.length) {
      const freq = {}
      logs.forEach(r => { freq[r.page_title || r.page_slug] = (freq[r.page_title || r.page_slug] || 0) + 1 })
      const top = Object.entries(freq).sort((a,b) => b[1]-a[1])[0]
      document.getElementById('statTopFile').innerHTML =
        `${top[0]} <span>${top[1]}x</span>`
    } else {
      document.getElementById('statTopFile').textContent = '—'
    }
  }

  // ── TABS ──────────────────────────────────────────────────────────────────
  function setTab(tab) {
    activeTab = tab
    document.querySelectorAll('.tab-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.tab === tab)
    )
    sortCol = ''; sortDir = 'desc'
    renderTab()
  }

  function renderTab() {
    const titles = { email: 'Por usuário', file: 'Por arquivo', log: 'Log completo' }
    document.getElementById('tableTitle').textContent = titles[activeTab]

    if      (activeTab === 'email') renderByEmail()
    else if (activeTab === 'file')  renderByFile()
    else                            renderLog()
  }

  // ── POR USUÁRIO ───────────────────────────────────────────────────────────
  function renderByEmail() {
    const head = document.getElementById('tableHead')
    const body = document.getElementById('tableBody')

    head.innerHTML = `<tr>
      <th onclick="sort('email')" class="${sortClass('email')}">E-mail<span class="sort-icon"></span></th>
      <th onclick="sort('count')" class="${sortClass('count')}">Acessos<span class="sort-icon"></span></th>
      <th>Distribuição</th>
      <th onclick="sort('last')" class="${sortClass('last')}">Último acesso<span class="sort-icon"></span></th>
    </tr>`

    const map = {}
    filtered.forEach(r => {
      if (!map[r.user_email]) map[r.user_email] = { count: 0, last: r.accessed_at }
      map[r.user_email].count++
      if (r.accessed_at > map[r.user_email].last) map[r.user_email].last = r.accessed_at
    })

    let rows = Object.entries(map).map(([email, d]) => ({ email, ...d }))
    const maxCount = Math.max(...rows.map(r => r.count), 1)

    if (sortCol === 'email') rows.sort((a,b) => sortDir === 'asc' ? a.email.localeCompare(b.email) : b.email.localeCompare(a.email))
    else if (sortCol === 'count') rows.sort((a,b) => sortDir === 'asc' ? a.count - b.count : b.count - a.count)
    else if (sortCol === 'last')  rows.sort((a,b) => sortDir === 'asc' ? a.last.localeCompare(b.last) : b.last.localeCompare(a.last))
    else rows.sort((a,b) => b.count - a.count)

    document.getElementById('recordCount').textContent = `${rows.length} usuário${rows.length !== 1 ? 's' : ''}`

    if (!rows.length) { body.innerHTML = '<tr class="empty-row"><td colspan="4">Nenhum registro encontrado.</td></tr>'; return }

    body.innerHTML = rows.map(r => `
      <tr>
        <td class="td-email">${r.email}</td>
        <td class="td-count">${r.count}</td>
        <td class="td-bar-wrap">
          <div class="td-bar"><div class="td-bar-fill" style="width:${Math.round(r.count/maxCount*100)}%"></div></div>
        </td>
        <td class="td-date">${fmtDate(r.last)}</td>
      </tr>`).join('')
  }

  // ── POR ARQUIVO ───────────────────────────────────────────────────────────
  function renderByFile() {
    const head = document.getElementById('tableHead')
    const body = document.getElementById('tableBody')

    head.innerHTML = `<tr>
      <th onclick="sort('file')" class="${sortClass('file')}">Arquivo<span class="sort-icon"></span></th>
      <th onclick="sort('count')" class="${sortClass('count')}">Acessos<span class="sort-icon"></span></th>
      <th>Distribuição</th>
      <th onclick="sort('users')" class="${sortClass('users')}">Usuários únicos<span class="sort-icon"></span></th>
      <th onclick="sort('last')" class="${sortClass('last')}">Último acesso<span class="sort-icon"></span></th>
    </tr>`

    const map = {}
    filtered.forEach(r => {
      const key = r.page_slug
      if (!map[key]) map[key] = { title: r.page_title || r.page_slug, count: 0, users: new Set(), last: r.accessed_at }
      map[key].count++
      map[key].users.add(r.user_email)
      if (r.accessed_at > map[key].last) map[key].last = r.accessed_at
    })

    let rows = Object.entries(map).map(([slug, d]) => ({ slug, ...d, users: d.users.size }))
    const maxCount = Math.max(...rows.map(r => r.count), 1)

    if      (sortCol === 'file')  rows.sort((a,b) => sortDir === 'asc' ? a.title.localeCompare(b.title) : b.title.localeCompare(a.title))
    else if (sortCol === 'count') rows.sort((a,b) => sortDir === 'asc' ? a.count - b.count : b.count - a.count)
    else if (sortCol === 'users') rows.sort((a,b) => sortDir === 'asc' ? a.users - b.users : b.users - a.users)
    else if (sortCol === 'last')  rows.sort((a,b) => sortDir === 'asc' ? a.last.localeCompare(b.last) : b.last.localeCompare(a.last))
    else rows.sort((a,b) => b.count - a.count)

    document.getElementById('recordCount').textContent = `${rows.length} arquivo${rows.length !== 1 ? 's' : ''}`

    if (!rows.length) { body.innerHTML = '<tr class="empty-row"><td colspan="5">Nenhum registro encontrado.</td></tr>'; return }

    body.innerHTML = rows.map(r => `
      <tr>
        <td class="td-file" title="${r.title}">${r.title}</td>
        <td class="td-count">${r.count}</td>
        <td class="td-bar-wrap">
          <div class="td-bar"><div class="td-bar-fill" style="width:${Math.round(r.count/maxCount*100)}%"></div></div>
        </td>
        <td style="font-size:13px;color:var(--text-dim)">${r.users}</td>
        <td class="td-date">${fmtDate(r.last)}</td>
      </tr>`).join('')
  }

  // ── LOG COMPLETO ──────────────────────────────────────────────────────────
  function renderLog() {
    const head = document.getElementById('tableHead')
    const body = document.getElementById('tableBody')

    head.innerHTML = `<tr>
      <th onclick="sort('email')" class="${sortClass('email')}">E-mail<span class="sort-icon"></span></th>
      <th onclick="sort('file')"  class="${sortClass('file')}">Arquivo<span class="sort-icon"></span></th>
      <th onclick="sort('date')"  class="${sortClass('date')}">Data/Hora<span class="sort-icon"></span></th>
    </tr>`

    let rows = [...filtered]
    if      (sortCol === 'email') rows.sort((a,b) => sortDir === 'asc' ? a.user_email.localeCompare(b.user_email) : b.user_email.localeCompare(a.user_email))
    else if (sortCol === 'file')  rows.sort((a,b) => sortDir === 'asc' ? (a.page_title||'').localeCompare(b.page_title||'') : (b.page_title||'').localeCompare(a.page_title||''))
    else if (sortCol === 'date')  rows.sort((a,b) => sortDir === 'asc' ? a.accessed_at.localeCompare(b.accessed_at) : b.accessed_at.localeCompare(a.accessed_at))
    else rows.sort((a,b) => b.accessed_at.localeCompare(a.accessed_at))

    document.getElementById('recordCount').textContent = `${rows.length} registro${rows.length !== 1 ? 's' : ''}`

    if (!rows.length) { body.innerHTML = '<tr class="empty-row"><td colspan="3">Nenhum registro encontrado.</td></tr>'; return }

    body.innerHTML = rows.map(r => `
      <tr>
        <td class="td-email">${r.user_email}</td>
        <td class="td-file" title="${r.page_title || r.page_slug}">${r.page_title || r.page_slug}</td>
        <td class="td-date">${fmtDatetime(r.accessed_at)}</td>
      </tr>`).join('')
  }

  // ── SORT ──────────────────────────────────────────────────────────────────
  function sort(col) {
    if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc'
    else { sortCol = col; sortDir = 'desc' }
    renderTab()
  }

  function sortClass(col) {
    if (sortCol !== col) return ''
    return sortDir === 'asc' ? 'sort-asc' : 'sort-desc'
  }

  // ── UTILS ─────────────────────────────────────────────────────────────────
  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' })
  }
  function fmtDatetime(iso) {
    return new Date(iso).toLocaleString('pt-BR', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })
  }

  // ── CALENDAR PICKER ───────────────────────────────────────────────────────
  function initCalendar() {
    const WEEKDAYS = ['D','S','T','Q','Q','S','S']
    const MONTHS   = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                      'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
    let leftYear, leftMonth
    let startDate = null, endDate = null
    let pendingStart = null, pendingEnd = null
    let hoverDate = null, selecting = false
    let modal = null

    const pad     = n => String(n).padStart(2,'0')
    const toStr   = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`
    const cmp     = (a,b) => a < b ? -1 : a > b ? 1 : 0
    const fromStr = s => { const [y,m,d] = s.split('-').map(Number); return {y,m:m-1,d} }
    const daysInMonth = (y,m) => new Date(y,m+1,0).getDate()
    const dayOfWeek   = (y,m,d) => new Date(y,m,d).getDay()

    function formatRange(from, to) {
      if (!from) return 'Qualquer data'
      const f = fromStr(from), t = to ? fromStr(to) : f
      if (!to || from === to) return `${f.d} de ${MONTHS[f.m]} de ${f.y}`
      if (f.y === t.y && f.m === t.m) return `${f.d}–${t.d} de ${MONTHS[f.m]} de ${f.y}`
      if (f.y === t.y) return `${f.d} ${MONTHS[f.m].slice(0,3)} – ${t.d} ${MONTHS[t.m].slice(0,3)} ${f.y}`
      return `${f.d}/${pad(f.m+1)}/${f.y} – ${t.d}/${pad(t.m+1)}/${t.y}`
    }

    function buildMonthHTML(year, month) {
      const today = new Date()
      const todayS = toStr(today.getFullYear(), today.getMonth(), today.getDate())
      const sel0 = pendingStart || startDate
      const sel1 = (selecting ? hoverDate : null) || pendingEnd || endDate
      const [rangeA, rangeB] = sel0 && sel1
        ? (cmp(sel0,sel1) <= 0 ? [sel0,sel1] : [sel1,sel0]) : [sel0, null]
      const firstDOW = dayOfWeek(year,month,1), days = daysInMonth(year,month)
      let h = `<div class="cal-month-header"><div class="cal-month-title">${MONTHS[month]} ${year}</div></div>`
      h += '<div class="cal-weekdays">' + WEEKDAYS.map(w=>`<span class="cal-weekday">${w}</span>`).join('') + '</div><div class="cal-days">'
      for (let i = 0; i < firstDOW; i++) h += '<div class="cal-day empty"></div>'
      for (let d = 1; d <= days; d++) {
        const ds = toStr(year,month,d)
        let cls = 'cal-day'
        if (ds === rangeA) cls += ' range-start'
        if (rangeB && ds === rangeB) cls += ' range-end'
        if (rangeA && rangeB && cmp(ds,rangeA)>0 && cmp(ds,rangeB)<0) cls += ' in-range'
        if (ds === todayS) cls += ' today'
        h += `<div class="${cls}" data-date="${ds}"><span class="day-num">${d}</span></div>`
      }
      return h + '</div>'
    }

    function render() {
      const ry = leftMonth===11?leftYear+1:leftYear, rm = leftMonth===11?0:leftMonth+1
      document.getElementById('calLeft').innerHTML  = buildMonthHTML(leftYear,leftMonth)
      document.getElementById('calRight').innerHTML = buildMonthHTML(ry,rm)
      document.getElementById('calPrev').onclick = () => { leftMonth===0?(leftMonth=11,leftYear--):leftMonth--; render() }
      document.getElementById('calNext').onclick = () => { leftMonth===11?(leftMonth=0,leftYear++):leftMonth++; render() }
    }

    function createModal() {
      const o = document.createElement('div')
      o.id = 'calModal'; o.className = 'cal-modal-overlay'
      o.setAttribute('role','dialog'); o.setAttribute('aria-modal','true')
      o.innerHTML = `<div class="cal-modal-content" id="calModalContent">
        <div class="cal-modal-header">
          <span class="cal-modal-title">Selecionar período</span>
          <button class="cal-modal-close" id="calModalClose" aria-label="Fechar">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="cal-nav-row">
          <button class="cal-nav" id="calPrev">&#8249;</button>
          <div class="calendar-months"><div class="cal-month" id="calLeft"></div><div class="cal-month" id="calRight"></div></div>
          <button class="cal-nav" id="calNext">&#8250;</button>
        </div>
        <div class="calendar-actions">
          <button class="btn-cal-cancel" id="calCancel">Cancelar</button>
          <button class="btn-cal-apply" id="calApply">Aplicar</button>
        </div>
      </div>`
      document.body.appendChild(o)
      return o
    }

    function open() {
      pendingStart = startDate; pendingEnd = endDate; selecting = false; hoverDate = null
      if (!modal) {
        modal = createModal()
        const months = modal.querySelector('.calendar-months')
        months.addEventListener('click', e => {
          const cell = e.target.closest('[data-date]'); if (!cell) return
          const ds = cell.dataset.date
          if (!selecting) { pendingStart=ds; pendingEnd=null; hoverDate=null; selecting=true }
          else { const [a,b]=cmp(pendingStart,ds)<=0?[pendingStart,ds]:[ds,pendingStart]; pendingStart=a;pendingEnd=b;hoverDate=null;selecting=false }
          render()
        })
        months.addEventListener('mouseover', e => {
          if (!selecting) return
          const cell = e.target.closest('[data-date]'); if (!cell) return
          const ds = cell.dataset.date; if (ds===hoverDate) return; hoverDate=ds; render()
        })
        months.addEventListener('mouseleave', ()=>{ if (!selecting) return; hoverDate=null; render() })
        document.getElementById('calApply').addEventListener('click', ()=>{
          if (!pendingStart||!pendingEnd) return
          startDate=pendingStart; endDate=pendingEnd
          dateFrom=startDate; dateTo=endDate
          document.getElementById('rangeDisplay').textContent = formatRange(startDate,endDate)
          document.getElementById('calendarToggle').classList.add('active')
          close(); applyFilters()
        })
        document.getElementById('calCancel').addEventListener('click', close)
        document.getElementById('calModalClose').addEventListener('click', close)
        modal.addEventListener('click', e=>{ if(e.target===modal) close() })
        document.addEventListener('keydown', e=>{ if(e.key==='Escape'&&modal.classList.contains('open')) close() })
      }
      const now=new Date()
      leftYear=startDate?fromStr(startDate).y:now.getFullYear()
      leftMonth=startDate?fromStr(startDate).m:now.getMonth()
      if(leftMonth===11) leftMonth=10
      const trigger=document.getElementById('calendarToggle')
      const content=document.getElementById('calModalContent')
      const rect=trigger.getBoundingClientRect(), cardW=content.offsetWidth||480
      let top=rect.bottom+8, left=rect.left
      if(left+cardW>window.innerWidth-16) left=window.innerWidth-cardW-16
      if(left<16) left=16
      if(top+380>window.innerHeight-16) top=rect.top-380-8
      content.style.top=top+'px'; content.style.left=left+'px'
      modal.classList.add('open')
      render()
    }

    function close() { if(!modal) return; modal.classList.remove('open'); selecting=false; hoverDate=null }

    document.getElementById('calendarToggle').addEventListener('click', e=>{ if(e.target.id==='dateClear') return; open() })
    document.getElementById('dateClear').addEventListener('click', e=>{
      e.stopPropagation()
      startDate=null; endDate=null; dateFrom=''; dateTo=''
      document.getElementById('rangeDisplay').textContent='Qualquer data'
      document.getElementById('calendarToggle').classList.remove('active')
      applyFilters()
    })
  }
</script>
</body>
</html>
