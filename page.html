<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carregando… — A Certain Index</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/page.css">
</head>
<body>

<div class="layout">
  <div class="topbar">
    <a href="index.html" class="back-btn">← Voltar</a>
    <div class="topbar-sep"></div>
    <span class="topbar-cat" id="topCat"></span>
    <span class="topbar-title" id="topTitle">Carregando…</span>
    <span class="topbar-date" id="topDate"></span>
  </div>

  <div class="error" id="errorState">
    <div class="error-code" id="errorCode">404</div>
    <h2 id="errorTitle">Documento não encontrado</h2>
    <p id="errorMsg">O slug solicitado não existe ou foi removido.</p>
    <a href="index.html">← Voltar ao índice</a>
  </div>

  <iframe id="viewer" title="Visualizador de documento" allowfullscreen></iframe>
</div>

<script>
  const SUPABASE_URL = '__SUPABASE_URL__'
  const SUPABASE_KEY = '__SUPABASE_KEY__'
  const client   = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
  const IS_LOCAL = ['localhost', '127.0.0.1'].includes(location.hostname)
  const DEV_ROLE = IS_LOCAL ? (new URLSearchParams(location.search).get('devRole') || 'analyst') : null

  const params = new URLSearchParams(location.search)
  const slug   = params.get('slug')

  async function checkAuth() {
    if (IS_LOCAL) return true
    const { data: { session } } = await client.auth.getSession()
    if (!session) {
      location.replace(`login.html?next=${encodeURIComponent(location.pathname + location.search)}`)
      return false
    }
    return true
  }

  function showError(code = 404, title = 'Documento não encontrado', msg = 'O slug solicitado não existe ou foi removido.') {
    document.getElementById('errorCode').textContent  = code
    document.getElementById('errorTitle').textContent = title
    document.getElementById('errorMsg').textContent   = msg
    document.getElementById('errorState').style.display = 'flex'
    document.getElementById('viewer').style.display     = 'none'
  }

  async function load() {
    if (!await checkAuth()) return
    if (!slug) { showError(); return }

    let data

    if (IS_LOCAL) {
      // Modo desenvolvimento: API local do dev-server.js
      try {
        const res = await fetch(`/api/pages?slug=${encodeURIComponent(slug)}`)
        if (!res.ok) { showError(); return }
        data = await res.json()
      } catch { showError(); return }
    } else {
      // Modo produção: Supabase
      const { data: row, error } = await client
        .from('pages')
        .select('id, title, category, storage_path, created_at, analyst_only')
        .eq('slug', slug)
        .eq('published', true)
        .single()
      if (error || !row) { showError(); return }
      data = row
    }

    if (data.analyst_only) {
      if (IS_LOCAL) {
        if (DEV_ROLE !== 'analyst' && DEV_ROLE !== 'editor') {
          showError(403, 'Acesso restrito', 'Este documento é exclusivo para analistas.')
          return
        }
      } else {
        const { data: { session: sess } } = await client.auth.getSession()
        const { data: roleData } = sess
          ? await client.from('user_roles').select('role').eq('user_id', sess.user.id).single()
          : { data: null }
        const role = roleData?.role ?? 'employee'
        if (role !== 'analyst' && role !== 'editor') {
          showError(403, 'Acesso restrito', 'Este documento é exclusivo para analistas.')
          return
        }
      }
    }

    document.title = `${data.title} — A Certain Index`
    document.getElementById('topTitle').textContent = data.title

    if (data.category) {
      document.getElementById('topCat').textContent = data.category
    } else {
      document.getElementById('topCat').style.display = 'none'
      document.querySelector('.topbar-sep').style.display = 'none'
    }

    document.getElementById('topDate').textContent = new Date(data.created_at)
      .toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' })

    const viewer = document.getElementById('viewer')

    if (IS_LOCAL) {
      // Dev: carrega direto via src (mesma origem)
      viewer.src = `/pages/${data.storage_path}`
    } else {
      // Produção: Supabase Storage retorna X-Frame-Options: SAMEORIGIN,
      // que bloqueia iframe cross-origin. Solução: buscar o HTML
      // autenticado e injetar via srcdoc (sem restrição de origem).
      const { data: blob, error: dlErr } = await client.storage
        .from('pages')
        .download(data.storage_path)

      if (dlErr) { showError(); return }

      viewer.srcdoc = await blob.text()
      logAccess(data)
    }
  }

  async function logAccess(data) {
    const { data: { session } } = await client.auth.getSession()
    if (!session) return
    await client.from('access_logs').insert({
      page_id:    data.id,
      page_slug:  slug,
      page_title: data.title,
      user_email: session.user.email,
    })
  }

  load()
</script>
</body>
</html>
