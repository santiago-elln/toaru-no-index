<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carregando… — A Certain Index</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      overflow: hidden;
    }

    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      height: 48px; flex-shrink: 0;
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px;
      background: rgba(10,10,10,0.98);
      border-bottom: 1px solid rgba(76,175,50,0.22);
      z-index: 10;
    }

    .back-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      color: #9a9a9a; font-size: 13px;
      text-decoration: none; transition: all 0.18s;
      white-space: nowrap; flex-shrink: 0;
    }
    .back-btn:hover { border-color: rgba(76,175,50,0.35); color: #e8e8e8; }

    .topbar-sep {
      width: 1px; height: 20px; flex-shrink: 0;
      background: rgba(255,255,255,0.09);
    }

    .topbar-cat {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: #4caf32;
      flex-shrink: 0;
    }

    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; min-width: 0;
    }

    .topbar-date {
      font-size: 11px; color: #636363; flex-shrink: 0;
    }

    /* ── IFRAME ── */
    #viewer {
      flex: 1;
      border: none;
      width: 100%;
      background: #fff;
    }

    /* ── ERROR ── */
    .error {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; text-align: center;
      padding: 40px;
    }

    .error-code {
      font-family: 'Syne', sans-serif;
      font-size: 72px; font-weight: 800;
      color: rgba(76,175,50,0.25);
      line-height: 1;
    }

    .error h2 { font-size: 20px; color: #e8e8e8; }
    .error p  { font-size: 14px; color: #636363; }

    .error a {
      display: inline-block; margin-top: 8px;
      padding: 8px 20px; border-radius: 8px;
      background: rgba(76,175,50,0.12);
      border: 1px solid rgba(76,175,50,0.28);
      color: #4caf32; font-size: 14px; text-decoration: none;
      transition: background 0.2s;
    }
    .error a:hover { background: rgba(76,175,50,0.22); }
  </style>
</head>
<body>

<div class="layout">
  <div class="topbar">
    <a href="index.html" class="back-btn">← Voltar</a>
    <div class="topbar-sep"></div>
    <span class="topbar-cat" id="topCat"></span>
    <span class="topbar-title" id="topTitle">Carregando…</span>
    <span class="topbar-date" id="topDate"></span>
  </div>

  <div class="error" id="errorState">
    <div class="error-code">404</div>
    <h2>Documento não encontrado</h2>
    <p>O slug solicitado não existe ou foi removido.</p>
    <a href="index.html">← Voltar ao índice</a>
  </div>

  <iframe id="viewer" title="Visualizador de documento" allowfullscreen></iframe>
</div>

<script>
  const SUPABASE_URL = 'https://zxgscwoozgqghnfoduii.supabase.co'
  const SUPABASE_KEY = 'sb_publishable_ODMuXRDKARvr7HYL2NzFWQ_tfNYZOzr'
  const client  = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
  const IS_LOCAL = ['localhost', '127.0.0.1'].includes(location.hostname)

  const params = new URLSearchParams(location.search)
  const slug   = params.get('slug')

  function showError() {
    document.getElementById('errorState').style.display = 'flex'
    document.getElementById('viewer').style.display     = 'none'
  }

  async function load() {
    if (!slug) { showError(); return }

    let data

    if (IS_LOCAL) {
      // Modo desenvolvimento: API local do dev-server.js
      try {
        const res = await fetch(`/api/pages?slug=${encodeURIComponent(slug)}`)
        if (!res.ok) { showError(); return }
        data = await res.json()
      } catch { showError(); return }
    } else {
      // Modo produção: Supabase
      const { data: row, error } = await client
        .from('pages')
        .select('title, category, storage_path, created_at')
        .eq('slug', slug)
        .eq('published', true)
        .single()
      if (error || !row) { showError(); return }
      data = row
    }

    document.title = `${data.title} — A Certain Index`
    document.getElementById('topTitle').textContent = data.title

    if (data.category) {
      document.getElementById('topCat').textContent = data.category
    } else {
      document.getElementById('topCat').style.display = 'none'
      document.querySelector('.topbar-sep').style.display = 'none'
    }

    document.getElementById('topDate').textContent = new Date(data.created_at)
      .toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' })

    // Local: serve o arquivo direto da pasta /pages via dev-server
    // Produção: carrega do Supabase Storage
    const fileUrl = IS_LOCAL
      ? `/pages/${data.storage_path}`
      : `${SUPABASE_URL}/storage/v1/object/public/pages/${data.storage_path}`

    document.getElementById('viewer').src = fileUrl
  }

  load()
</script>
</body>
</html>
